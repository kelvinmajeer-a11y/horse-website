<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Good Quality Safe Trail Horses</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1e1e1e,#2a2a2a);
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

/* HEADER */
.header{
text-align:center;
padding:25px;
background:black;
border-bottom:3px solid #c46b2a;
position:relative;
}

.header img{
max-width:95%;
border-radius:8px;
}

.header h1{
color:#d97706;
margin-top:10px;
}

/* MENU ICON */
.menu-icon{
position:absolute;
top:20px;
left:20px;
font-size:34px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.4s;
padding-top:80px;
z-index:1000;
}

.sidebar a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.sidebar a:hover{
background:#c46b2a;
}

.closebtn{
position:absolute;
top:20px;
right:25px;
font-size:36px;
cursor:pointer;
}

/* CONTACT */
.contact-container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.contact-container h2{
text-align:center;
color:#d97706;
}

.contact-info{
text-align:center;
margin-bottom:25px;
}

.call-btn, .text-btn{
display:block;
text-align:center;
padding:14px;
border-radius:6px;
color:white;
font-size:18px;
text-decoration:none;
margin-bottom:10px;
}

.call-btn{background:#28a745;}
.text-btn{background:#c46b2a;}

.call-btn:hover{background:#34c759;}
.text-btn:hover{background:#d97706;}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input, textarea{
padding:12px;
border:none;
border-bottom:2px solid #c46b2a;
background:#222;
color:white;
}

textarea{
height:140px;
}

button{
padding:14px;
background:#c46b2a;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#d97706;
}

/* MOBILE */
@media(max-width:600px){
.row{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="mySidebar" class="sidebar">
<span class="closebtn" onclick="closeMenu()">×</span>
<a href="index.html">Home</a>
<a href="horses.html">Horses for Sale</a>
<a href="contact.html">Contact</a>
<a href="about.html">Buyer's Guide</a>
</div>

<!-- HEADER -->
<div class="header">
<span class="menu-icon" onclick="openMenu()">☰</span>
<img src="images/3459742C-1707-43DE-BEBD-7EF71367C25C.PNG">
<h1>Good Quality Safe / Trail Horses</h1>
</div>

<!-- CONTACT -->
<div class="contact-container">

<h2>Contact Us</h2>

<div class="contact-info">
<p>📞 +1 (708) 872-7065</p>
<p>📧 kelvinmajeer@gmail.com</p>
<p>We can arrange delivery anywhere in the USA.</p>
</div>

<a href="tel:+17088727065" class="call-btn">📞 Call Now</a>
<a href="sms:+17088727065" class="text-btn">💬 Send Text Message</a>

<form action="https://formsubmit.co/d5e992a3602972d8c83c48c234806392" method="POST">

<!-- SETTINGS -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Horse Inquiry">

<!-- AUTO REPLY -->
<input type="hidden" name="_autoresponse" value="Thank you for reaching out to Good Quality Safe Trail Horses. We received your message and will get back to you shortly.">

<div class="row">
<input type="text" name="First Name" placeholder="First Name" required>
<input type="text" name="Last Name" placeholder="Last Name">
</div>

<div class="row">
<input type="email" name="Email" placeholder="Email" required>
<input type="text" name="Subject" placeholder="Subject">
</div>

<input type="text" name="Horse Name" placeholder="Horse you are interested in">
<input type="text" name="Location" placeholder="Your City / State">

<textarea name="Message" placeholder="Write your message here..." required></textarea>

<button type="submit">Send Message</button>

</form>

<p style="text-align:center;margin-top:20px;color:#aaa;">
We usually respond within a few hours.
</p>

</div>

<script>
function openMenu(){
document.getElementById("mySidebar").style.width="260px";
}
function closeMenu(){
document.getElementById("mySidebar").style.width="0";
}
</script>

</body>
</html>
