<!DOCTYPE html>

<head>

<title>Contact - Good Quality Safe / Trail Horses</title>

<style>

body{
background: linear-gradient(135deg,#0f0f0f,#1e1e1e,#2a2a2a);
color:white;
font-family: Arial, Helvetica, sans-serif;
margin:0;
}

/* HEADER */

.header{
text-align:center;
padding:30px;
background:black;
border-bottom:3px solid #c46b2a;
}

.header img{
max-width:95%;
height:auto;
border-radius:8px;
}

.header h1{
color:#d97706;
margin-top:10px;
}

/* NAVIGATION */

nav{
text-align:center;
padding:15px;
background:#111;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#c46b2a;
}

/* CONTACT SECTION */

.contact-container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.contact-container h2{
text-align:center;
color:#d97706;
margin-bottom:20px;
}

.contact-info{
text-align:center;
margin-bottom:30px;
}

.contact-info p{
margin:5px 0;
}

form{
display:flex;
flex-direction:column;
gap:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input, textarea{
padding:12px;
border:none;
border-bottom:2px solid #c46b2a;
background:#222;
color:white;
font-size:16px;
}

textarea{
height:140px;
resize:vertical;
}

button{
padding:14px;
background:#c46b2a;
border:none;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#d97706;
}

/* MOBILE */

@media(max-width:600px){

.row{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>
