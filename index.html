<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Good Quality Safe Trail Horses</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1e1e1e,#2a2a2a);
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
}

/* HEADER */

.header{
text-align:center;
padding:25px;
background:black;
border-bottom:3px solid #c46b2a;
position:relative;
}

.header img{
max-width:95%;
border-radius:8px;
}

.header h1{
color:#d97706;
margin-top:10px;
}

/* HAMBURGER MENU */

.menu-icon{
position:absolute;
top:20px;
left:20px;
font-size:34px;
cursor:pointer;
color:white;
z-index:1001;
}

/* SIDEBAR */

.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#111;
overflow-x:hidden;
transition:0.4s;
padding-top:80px;
z-index:1000;
box-shadow:5px 0 15px rgba(0,0,0,0.5);
}

.sidebar a{
padding:12px 25px;
text-decoration:none;
font-size:20px;
color:white;
display:block;
}

.sidebar a:hover{
background:#c46b2a;
}

.closebtn{
position:absolute;
top:20px;
right:25px;
font-size:36px;
cursor:pointer;
}

/* CONTACT SECTION */

.contact-container{
max-width:800px;
margin:auto;
padding:40px 20px;
}

.contact-container h2{
text-align:center;
color:#d97706;
margin-bottom:20px;
}

.contact-info{
text-align:center;
margin-bottom:30px;
}

.contact-info p{
margin:6px 0;
}

/* CALL BUTTONS */

.call-btn{
display:block;
text-align:center;
background:#28a745;
padding:14px;
border-radius:6px;
color:white;
font-size:18px;
text-decoration:none;
margin-bottom:10px;
}

.text-btn{
display:block;
text-align:center;
background:#c46b2a;
padding:14px;
border-radius:6px;
color:white;
font-size:18px;
text-decoration:none;
margin-bottom:25px;
}

.call-btn:hover{
background:#34c759;
}

.text-btn:hover{
background:#d97706;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input, textarea{
padding:12px;
border:none;
border-bottom:2px solid #c46b2a;
background:#222;
color:white;
font-size:16px;
border-radius:4px;
}

textarea{
height:140px;
resize:vertical;
}

button{
padding:14px;
background:#c46b2a;
border:none;
color:white;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

button:hover{
background:#d97706;
}

/* MOBILE */

@media(max-width:600px){

.row{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div id="mySidebar" class="sidebar">
