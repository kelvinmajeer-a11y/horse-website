<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Good Quality Safe Trail Horses</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#0f0f0f,#1e1e1e,#2a2a2a);
color:white;
font-family:'EB Garamond', Arial;
margin:0;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
background:black;
border-bottom:3px solid #c46b2a;
position:relative;
}

/* MENU BUTTON */
.menu-btn{
position:absolute;
top:20px;
left:20px;
font-size:28px;
cursor:pointer;
}

/* SIDE MENU */
.side-menu{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:#111;
padding-top:60px;
transition:0.3s;
z-index:1000;
}

.side-menu a{
display:block;
padding:15px;
color:white;
text-decoration:none;
border-bottom:1px solid #333;
}

.side-menu a:hover{
background:#c46b2a;
}

/* LOGO */
.header img{
width:280px;
max-width:90%;
}

.header h1{
color:#d97706;
font-size:20px;
margin-top:10px;
}

/* CONTACT INFO */
.contact-info{
text-align:center;
padding:30px 20px;
}

.contact-info p{
color:#ddd;
margin:6px 0;
}

/* FORM */
.form-section{
background:#000;
padding:40px 20px;
}

.form-container{
max-width:800px;
margin:auto;
}

.form-container h2{
text-align:center;
margin-bottom:10px;
}

.form-subtitle{
text-align:center;
margin-bottom:30px;
color:#ccc;
}

form{
display:flex;
flex-direction:column;
gap:20px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input, textarea{
padding:12px;
border:none;
border-bottom:2px solid #c46b2a;
background:#222;
color:white;
}

textarea{
height:120px;
}

button{
padding:14px;
background:#c46b2a;
border:none;
color:white;
cursor:pointer;
}

button:hover{
background:#d97706;
}

/* MOBILE */
@media(max-width:600px){
.row{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<!-- SIDE MENU -->
<div class="side-menu" id="menu">
<a href="index.html">Home</a>
<a href="horses.html">Horses</a>
<a href="contact.html">Contact</a>
<a href="about.html">Buyer’s Guide</a>
</div>

<!-- HEADER -->
<div class="header">
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<img src="images/3459742C-1707-43DE-BEBD-7EF71367C25C.PNG">
<h1>Good Quality Safe / Trail Horses</h1>
</div>

<!-- INFO -->
<div class="contact-info">
<p><strong>Phone:</strong> +1 (708) 872-7065</p>
<p><strong>Email:</strong> kelvinmajeer@gmail.com</p>
<p>We can help arrange delivery anywhere in the USA.</p>
</div>

<!-- FORM -->
<div class="form-section">
<div class="form-container">

<h2>Contact Us</h2>
<p class="form-subtitle">Send us a message anytime</p>

<form action="https://formsubmit.co/d5e992a3602972d8c83c48c234806392" method="POST">

<!-- SETTINGS -->
<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Horse Inquiry">

<!-- AUTO REPLY -->
<input type="hidden" name="_autoresponse" value="Thank you for reaching out to Good Quality Safe Trail Horses. We received your message and will get back to you shortly.">

<div class="row">
<input type="text" name="First Name" placeholder="First Name" required>
<input type="text" name="Last Name" placeholder="Last Name">
</div>

<div class="row">
<input type="email" name="Email" placeholder="Email" required>
<input type="text" name="Subject" placeholder="Subject">
</div>

<textarea name="Message" placeholder="Write your message here..." required></textarea>

<button type="submit">Send Message</button>

</form>

</div>
</div>

<!-- SCRIPT -->
<script>
function toggleMenu(){
let menu = document.getElementById("menu");
if(menu.style.left === "0px"){
menu.style.left = "-250px";
}else{
menu.style.left = "0px";
}
}
</script>

</body>
</html>
