<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horses for Sale</title>

<style>

body{
background:linear-gradient(135deg,#0f0f0f,#1e1e1e,#2a2a2a);
color:white;
font-family:Arial;
margin:0;
}

.header{
text-align:center;
padding:30px;
background:black;
border-bottom:3px solid #c46b2a;
}

.header h1{
color:#d97706;
}

nav{
text-align:center;
padding:15px;
background:#111;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

nav a:hover{
color:#c46b2a;
}

.container{
width:90%;
max-width:1100px;
margin:auto;
padding:40px;
}

.page-title{
text-align:center;
color:#d97706;
margin-bottom:40px;
}

/* HORSE GRID */

.horse-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:30px;
margin-bottom:70px;
}

.horse-item{
background:#1a1a1a;
border:1px solid #c46b2a;
border-radius:10px;
padding:20px;
text-align:center;
transition:0.3s;
}

.horse-item:hover{
transform:scale(1.04);
}

.horse-item img{
width:100%;
border-radius:10px;
border:2px solid #c46b2a;
}

.horse-item h2{
color:#d97706;
margin-top:10px;
}

.horse-item a{
text-decoration:none;
color:#d97706;
}

.horse-item p{
color:#ddd;
}

/* FULL DESCRIPTION */

.horse-card{
background:#1a1a1a;
border:1px solid #c46b2a;
border-radius:12px;
padding:30px;
margin-bottom:60px;
}

.horse-card h1{
color:#d97706;
}

.horse-card p{
color:#ddd;
line-height:1.6;
}

.photo-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.photo-grid img{
width:300px;
border-radius:8px;
border:2px solid #c46b2a;
}

.video{
margin-top:20px;
}

.video iframe{
width:100%;
max-width:560px;
height:315px;
border:2px solid #c46b2a;
border-radius:8px;
}

</style>
</head>

<body>

</body>
</html>
